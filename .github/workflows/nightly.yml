name: Nightly Build

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - 'automation/*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      artifact_version: ${{ steps.version.outputs.artifact_version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      build_ref: ${{ steps.check.outputs.build_ref }}
      build_branch: ${{ steps.check.outputs.build_branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build source
        id: check
        run: |
          event="${{ github.event_name }}"
          if [[ "$event" == "push" ]]; then
            build_ref="${{ github.ref }}"
            build_branch="${{ github.ref_name }}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Triggered by push to ${build_branch}; building nightly."
          else
            build_ref="origin/main"
            build_branch="main"
            latest_commit_date=$(git log -1 --format=%ct "$build_ref")
            now=$(date +%s)
            age=$((now - latest_commit_date))
            if [[ $age -le 86400 ]]; then
              echo "should_build=true" >> "$GITHUB_OUTPUT"
              echo "Latest commit on ${build_branch} is ${age}s old; building nightly."
            else
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "No commits on ${build_branch} in the last 24 hours (${age}s old); skipping nightly."
            fi
          fi
          echo "build_ref=${build_ref}" >> "$GITHUB_OUTPUT"
          echo "build_branch=${build_branch}" >> "$GITHUB_OUTPUT"

      - name: Compute nightly version
        id: version
        if: steps.check.outputs.should_build == 'true'
        run: |
          workspace_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          date=$(date -u +%Y%m%d)
          short_sha=$(git rev-parse --short ${{ steps.check.outputs.build_ref }})
          artifact_version="${workspace_version}-nightly.${date}+${short_sha}"
          echo "artifact_version=${artifact_version}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "Nightly version: ${artifact_version}"

  build-and-publish:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-and-build.outputs.build_ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release -p toge -p toged

      - name: Package nightly artifacts
        id: package
        run: bash scripts/release/package-artifacts.sh "${{ needs.check-and-build.outputs.artifact_version }}" nightly linux-x86_64

      - name: Update rolling nightly tag
        run: |
          git tag -f nightly ${{ needs.check-and-build.outputs.build_ref }}
          git push -f origin nightly

      - name: Publish nightly prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.check-and-build.outputs.artifact_version }}"
          short_sha="${{ needs.check-and-build.outputs.short_sha }}"
          branch="${{ needs.check-and-build.outputs.build_branch }}"
          gh release delete nightly --yes || true
          gh release create nightly \
            --target "${branch}" \
            --title "Nightly (${version})" \
            --notes "Automated nightly build from ${branch} @ ${short_sha}." \
            --prerelease \
            dist/*
