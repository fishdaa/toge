name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    if: ${{ !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/checks.yml
    with:
      ref: ${{ github.ref }}

  build-release:
    if: ${{ !contains(github.ref_name, '-') }}
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: scripts/release/verify-tag.sh "${GITHUB_REF_NAME}"

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Package release artifacts
        run: scripts/release/package-artifacts.sh "${GITHUB_REF_NAME}" stable

      - name: Publish stable crates
        if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: scripts/release/publish-crates.sh stable

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: |
            dist/needle-*.tar.gz
            dist/needle-*.sha256
