name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    if: ${{ !contains(inputs.tag || github.ref_name, '-') }}
    uses: ./.github/workflows/checks.yml
    with:
      ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}

  build-release:
    if: ${{ !contains(inputs.tag || github.ref_name, '-') }}
    needs: checks
    runs-on: ubuntu-22.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: toge-gui/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches workspace version
        run: scripts/release/verify-tag.sh "${{ inputs.tag || github.ref_name }}"

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Install GUI dependencies
        run: npm ci --prefix toge-gui

      - name: Package release artifacts
        run: scripts/release/package-artifacts.sh "${{ inputs.tag || github.ref_name }}" stable

      - name: Package Linux GUI
        run: scripts/release/package-gui-artifacts.sh "${{ inputs.tag || github.ref_name }}"

      - name: Publish stable crates
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: scripts/release/publish-crates.sh stable

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: |
            dist/toge-*.tar.gz
            dist/toge-*.sha256
            dist/toge-gui_*.deb
            dist/toge-gui-*.rpm
            dist/Toge_*.AppImage
            dist/Toge_*.sha256

  package-arm64:
    if: ${{ !contains(inputs.tag || github.ref_name, '-') }}
    needs: build-release
    uses: ./.github/workflows/package-gui-arm64.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}
      version: ${{ inputs.tag || github.ref_name }}
      tag_name: ${{ inputs.tag || github.ref_name }}
    secrets: inherit
