name: Package Linux GUI ARM64

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to package
        required: true
        type: string
      version:
        description: Version to embed in the packages
        required: true
        type: string
      tag_name:
        description: GitHub release tag receiving the packages
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: toge-gui/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set package version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: scripts/release/set-version.sh "${RELEASE_VERSION#v}"

      - name: Install GUI dependencies
        run: npm ci --prefix toge-gui

      - name: Package ARM64 Linux GUI
        run: scripts/release/package-gui-artifacts.sh "${{ inputs.version }}"

      - name: Attach ARM64 packages to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/toge-gui_*.deb \
            dist/toge-gui-*.rpm \
            dist/Toge_*.AppImage \
            dist/toge-gui_*.sha256 \
            dist/toge-gui-*.sha256 \
            dist/Toge_*.sha256 \
            --clobber
