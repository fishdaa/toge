name: Auto Tag Stable

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-tag-stable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-stable:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release commit version
        id: version
        shell: bash
        run: |
          subject="$(git show -s --format=%s HEAD)"
          version_regex='^chore\(release\): cut v([0-9]+\.[0-9]+\.[0-9]+)( \(#[0-9]+\))?$'
          version=""
          if [[ "$subject" =~ $version_regex ]]; then
            version="${BASH_REMATCH[1]}"
          else
            message="$(git show -s --format=%B HEAD)"
            release_line="$(printf '%s\n' "$message" | grep -E '^chore\(release\): cut v[0-9]+\.[0-9]+\.[0-9]+( \(#[0-9]+\))?$' | head -n1 || true)"
            if [[ -n "$release_line" ]]; then
              version="$(printf '%s\n' "$release_line" | sed -E 's/^chore\(release\): cut v([0-9]+\.[0-9]+\.[0-9]+)( \(#[0-9]+\))?$/\1/')"
            fi
          fi

          if [[ -z "$version" ]]; then
            printf 'should_tag=false\n' >>"$GITHUB_OUTPUT"
            exit 0
          fi
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [[ "$manifest_version" != "$version" ]]; then
            printf 'release commit version %s does not match workspace version %s\n' "$version" "$manifest_version" >&2
            exit 1
          fi

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            printf 'should_tag=false\n' >>"$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'should_tag=true\n' >>"$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"

      - name: Create stable tag
        if: steps.version.outputs.should_tag == 'true'
        env:
          TAG_NAME: v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Stable release $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Dispatch stable release workflow
        if: steps.version.outputs.should_tag == 'true'
        uses: actions/github-script@v9
        env:
          TAG_NAME: v${{ steps.version.outputs.version }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "release.yml",
              ref: context.ref.replace("refs/heads/", ""),
              inputs: {
                tag: process.env.TAG_NAME,
              },
            });
