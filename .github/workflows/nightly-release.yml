name: Nightly Release

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
    with:
      ref: refs/heads/main

  publish-nightly:
    needs: checks
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: toge-gui/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Compute nightly version
        id: nightly
        shell: bash
        run: |
          base_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          nightly_version="${base_version}-nightly.$(date -u +%Y%m%d)+$(git rev-parse --short HEAD)"
          printf 'version=%s\n' "$nightly_version" >>"$GITHUB_OUTPUT"

      - name: Set nightly workspace version
        run: scripts/release/set-version.sh "${{ steps.nightly.outputs.version }}"

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Install GUI dependencies
        run: npm ci --prefix toge-gui

      - name: Package nightly artifacts
        run: scripts/release/package-artifacts.sh "${{ steps.nightly.outputs.version }}" nightly

      - name: Package nightly Linux GUI
        run: scripts/release/package-gui-artifacts.sh "${{ steps.nightly.outputs.version }}"

      - name: Move rolling nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push origin refs/tags/nightly --force

      - name: Publish nightly GitHub prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          make_latest: false
          body: |
            Rolling nightly build from `main`.

            Version: `${{ steps.nightly.outputs.version }}`
          files: |
            dist/toge-*.tar.gz
            dist/toge-*.sha256
            dist/toge-gui_*.deb
            dist/toge-gui-*.rpm
            dist/Toge_*.AppImage
            dist/Toge_*.sha256
